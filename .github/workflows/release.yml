name: Release CocoQR FE

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format and source branch
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag detected: $TAG"

          git fetch origin main dev --no-tags

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            CHANNEL="staging"
            TARGET_BRANCH="origin/dev"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="production"
            TARGET_BRANCH="origin/main"
          else
            echo "❌ Invalid tag format: $TAG"
            echo "Allowed: vX.Y.Z (production) or vX.Y.Z-rcN (staging)"
            exit 1
          fi

          echo "Release channel: $CHANNEL"
          echo "Required branch: $TARGET_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "$TARGET_BRANCH"; then
            echo "❌ Tag $TAG must be created from ${TARGET_BRANCH#origin/} branch history"
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          set -euo pipefail

          if [[ "${{ steps.meta.outputs.channel }}" == "staging" ]]; then
            MODE=staging
          else
            MODE=production
          fi

          docker build \
           --build-arg VITE_MODE=$MODE \
           --build-arg VITE_STAGING_API_URL=${{ vars.VITE_STAGING_API_URL }} \
           --build-arg VITE_PRODUCTION_API_URL=${{ vars.VITE_PRODUCTION_API_URL }} \
           -t ${{ secrets.DOCKER_USERNAME }}/mywallet-fe:${{ steps.meta.outputs.version }} \
           .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mywallet-fe:${{ steps.meta.outputs.version }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}

  deploy-staging:
    if: needs.build.outputs.channel == 'staging'
    needs: build
    runs-on: ubuntu-latest
    environment: STAGING

    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/mywallet-fe:${{ needs.build.outputs.version }}
            cd /opt/mywallet-fe-staging
            export IMAGE_TAG=${{ needs.build.outputs.version }}
            docker compose up -d mywallet-fe-staging
            docker image prune -f

  deploy-production:
    if: needs.build.outputs.channel == 'production'
    needs: build
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RC exists
        shell: bash
        run: |
          set -euo pipefail

          VERSION=${{ needs.build.outputs.version }}
          RC_TAGS=$(git tag -l "${VERSION}-rc*")

          if [ -z "$RC_TAGS" ]; then
            echo "❌ No RC tag found for ${VERSION}"
            exit 1
          fi

          echo "✅ Found RC tags:"
          echo "$RC_TAGS"

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/mywallet-fe:${{ needs.build.outputs.version }}
            cd /opt/mywallet-fe-production
            export IMAGE_TAG=${{ needs.build.outputs.version }}
            docker compose up -d mywallet-fe-production
            docker image prune -f
