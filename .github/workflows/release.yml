name: Release CocoQR FE

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
      - "v*.*.*-pre"
      - "v*.*.*-no-release"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      release_type: ${{ steps.meta.outputs.release_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format and source branch
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag detected: $TAG"

          git fetch origin main dev --no-tags

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            CHANNEL="staging"
            TARGET_BRANCH="origin/dev"
            RELEASE_TYPE="none"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-pre$ ]]; then
            CHANNEL="production"
            TARGET_BRANCH="origin/main"
            RELEASE_TYPE="pre-release"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-no-release$ ]]; then
            CHANNEL="production"
            TARGET_BRANCH="origin/main"
            RELEASE_TYPE="none"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="production"
            TARGET_BRANCH="origin/main"
            RELEASE_TYPE="release"
          else
            echo "❌ Invalid tag format: $TAG"
            echo "Allowed formats:"
            echo "  vX.Y.Z - production release"
            echo "  vX.Y.Z-rcN - staging"
            echo "  vX.Y.Z-pre - production pre-release"
            echo "  vX.Y.Z-no-release - production tag only"
            exit 1
          fi

          echo "Release channel: $CHANNEL"
          echo "Required branch: $TARGET_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "$TARGET_BRANCH"; then
            echo "❌ Tag $TAG must be created from ${TARGET_BRANCH#origin/} branch history"
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          set -euo pipefail

          if [[ "${{ steps.meta.outputs.channel }}" == "staging" ]]; then
            MODE=staging
          else
            MODE=production
          fi

          docker build \
           --build-arg VITE_MODE=$MODE \
           --build-arg VITE_STAGING_API_URL=${{ vars.VITE_STAGING_API_URL }} \
           --build-arg VITE_PRODUCTION_API_URL=${{ vars.VITE_PRODUCTION_API_URL }} \
           -t ${{ secrets.DOCKER_USERNAME }}/cocoqr-fe:${{ steps.meta.outputs.version }} \
           .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cocoqr-fe:${{ steps.meta.outputs.version }}

  create-release:
    if: needs.build.outputs.channel == 'production' && needs.build.outputs.release_type != 'none'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ needs.build.outputs.release_type == 'pre-release' }}
          generate_release_notes: true

  deploy-staging:
    if: needs.build.outputs.channel == 'staging'
    needs: build
    runs-on: ubuntu-latest
    environment: STAGING

    steps:
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/cocoqr-fe:${{ needs.build.outputs.version }}
            cd /opt/cocoqr-fe-staging
            grep -q "^IMAGE_TAG=" .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build.outputs.version }}/" .env || echo "IMAGE_TAG=${{ needs.build.outputs.version }}" >> .env
            docker compose up -d cocoqr-fe-staging
            docker image prune -f

  deploy-production:
    if: needs.build.outputs.channel == 'production' 
    needs: build
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RC exists
        if: needs.build.outputs.release_type == 'release'
        shell: bash
        run: |
          set -euo pipefail

          VERSION=${{ needs.build.outputs.version }}
          RC_TAGS=$(git tag -l "${VERSION}-rc*")

          if [ -z "$RC_TAGS" ]; then
            echo "❌ No RC tag found for ${VERSION}"
            exit 1
          fi

          echo "✅ Found RC tags:"
          echo "$RC_TAGS"

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/cocoqr-fe:${{ needs.build.outputs.version }}
            cd /opt/cocoqr-fe-production
            grep -q "^IMAGE_TAG=" .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build.outputs.version }}/" .env || echo "IMAGE_TAG=${{ needs.build.outputs.version }}" >> .env
            docker compose up -d cocoqr-fe-production
            docker image prune -f
